<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Exercises</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.exercise {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
}

input {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

button {
  padding: 10px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #45a049;
}

.result {
  margin-top: 10px;
  font-weight: bold;
  color: #333;
}
</style>
</head>

<body>

<div class="container">

  <!-- Exercise 1 -->
  <div class="exercise">
    <h2>Exercise 1: VAT Calculation</h2>
    <input type="number" id="price" placeholder="Enter raw price">
    <button onclick="calculateVAT()">Calculate</button>
    <div class="result" id="vatResult"></div>
  </div>

  <!-- Exercise 2 -->
  <div class="exercise">
    <h2>Exercise 2: Multiplication Table (2-9)</h2>
    <input type="number" id="tableNumber" placeholder="Enter number between 2 and 9">
    <button onclick="showTable()">Show Table</button>
    <div class="result" id="tableResult"></div>
  </div>

  <!-- Exercise 3 -->
  <div class="exercise">
    <h2>Exercise 3: Array Operations</h2>
    <button onclick="arrayOperations()">Calculate</button>
    <div class="result" id="arrayResult"></div>
  </div>

  <!-- Exercise 4 -->
  <div class="exercise">
    <h2>Exercise 4: Temperature Conversion</h2>
    <input type="number" id="celsius" placeholder="Enter Celsius">
    <button onclick="convertTemp()">Convert</button>
    <div class="result" id="tempResult"></div>
  </div>

  <!-- Exercise 5 -->
  <div class="exercise">
    <h2>Exercise 5: String Reversal</h2>
    <input type="text" id="reverseInput" placeholder="Enter text">
    <button onclick="reverseText()">Reverse</button>
    <div class="result" id="reverseResult"></div>
  </div>

  <!-- Exercise 6 -->
  <div class="exercise">
    <h2>Exercise 6: Vowel Counting</h2>
    <input type="text" id="vowelInput" placeholder="Enter text">
    <button onclick="countVowels()">Count</button>
    <div class="result" id="vowelResult"></div>
  </div>

</div>

<script>
// Exercise 1
function calculateVAT() {
  let price = parseFloat(document.getElementById("price").value);
  let finalPrice = price + (price * 18.5 / 100);
  document.getElementById("vatResult").innerText =
    "Final price with VAT: " + finalPrice.toFixed(2);
}

// Exercise 2
function showTable() {
  let number = parseInt(document.getElementById("tableNumber").value);
  let result = "";

  if (number < 2 || number > 9) {
    result = "Please enter a number between 2 and 9.";
  } else {
    for (let i = 1; i <= 10; i++) {
      result += number + " x " + i + " = " + (number * i) + "<br>";
    }
  }

  document.getElementById("tableResult").innerHTML = result;
}

// Exercise 3
function arrayOperations() {
  let numbers = [3, 11, 7, 2, 9, 10];

  let sum = numbers.reduce((a, b) => a + b, 0);
  let avg = sum / numbers.length;
  let min = Math.min(...numbers);
  let max = Math.max(...numbers);

  document.getElementById("arrayResult").innerHTML =
    "Array: " + numbers.join(", ") + "<br>" +
    "Sum: " + sum + "<br>" +
    "Average: " + avg.toFixed(2) + "<br>" +
    "Min: " + min + "<br>" +
    "Max: " + max;
}

// Exercise 4
function convertTemp() {
  let c = parseFloat(document.getElementById("celsius").value);
  let f = (c * 9/5) + 32;
  document.getElementById("tempResult").innerText =
    c + "°C = " + f.toFixed(2) + "°F";
}

// Exercise 5
function reverseText() {
  let text = document.getElementById("reverseInput").value;
  let reversed = text.split("").reverse().join("");
  document.getElementById("reverseResult").innerText = reversed;
}

// Exercise 6
function countVowels() {
  let text = document.getElementById("vowelInput").value;
  let count = 0;
  let vowels = "aeiouAEIOU";

  for (let char of text) {
    if (vowels.includes(char)) {
      count++;
    }
  }

  document.getElementById("vowelResult").innerText =
    "Number of vowels: " + count;
}
</script>

</body>
</html>
